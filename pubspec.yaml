name: eramyadak_shop
description: Eram Yadak WooCommerce Flutter app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  dio: 5.4.0
  cookie_jar: 4.0.8
  dio_cookie_manager: 3.1.1
  http: 1.1.0   # ⬅️ پایین آوردیم

  webview_flutter: 4.4.2   # ⬅️ نسخه پایدار بدون web جدید
  webview_flutter_android: 3.13.0
  webview_flutter_wkwebview: 3.10.0

  intl: 0.19.0

  url_launcher: 6.2.5
  shared_preferences: 2.2.2

  flutter_localizations:
    sdk: flutter

  cupertino_icons: 1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 3.0.0
  flutter_launcher_icons: 0.13.1
  flutter_native_splash: 2.4.1

# ❌ عمداً dependency_overrides حذف شد
# چون نسخه‌ها طوری انتخاب شدن که web اصلاً وارد نشه

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/baner/
