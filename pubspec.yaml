name: eramyadak_shop
description: Eram Yadak WooCommerce Flutter app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.9.0
  http: 1.1.0
  webview_flutter: 4.4.2
  dio_cookie_manager: ^3.2.0
  cookie_jar: ^4.0.8

  intl: ^0.20.2

  url_launcher: 6.1.14
  shared_preferences: 2.2.0

  flutter_localizations:
    sdk: flutter

  cupertino_icons: 1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_native_splash: 2.3.6
  flutter_launcher_icons: 0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/baner/
