name: eramyadak_shop
description: Eram Yadak WooCommerce Flutter app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  http: ^1.2.1

  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.15.0
  webview_flutter_wkwebview: ^3.12.0

  intl: 0.19.0   # 🔥 مهم (هماهنگ با Flutter)

  url_launcher: ^6.2.6
  shared_preferences: ^2.2.2

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

# 🔥 مهم‌ترین بخش (حل مشکل web)
dependency_overrides:
  web: 0.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/baner/
