workflows:
  android-workflow:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.22.0   # 🔥 ثابت و پایدار

    scripts:
      - name: Clean Deep
        script: |
          flutter clean
          rm -rf ~/.pub-cache
          flutter pub get

      - name: Build Android APK
        script: |
          flutter build apk --release --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - alirezazekri60@gmail.com
