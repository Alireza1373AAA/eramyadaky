workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.22.3

    scripts:
      - name: Clean project
        script: |
          flutter clean
          rm -rf pubspec.lock
          rm -rf .dart_tool

      - name: Get dependencies
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - alirezazekri60@gmail.com
