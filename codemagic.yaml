workflows:
  android-workflow:
    name: Android APK Build (Stable)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable

    scripts:
      - name: Clean EVERYTHING (important)
        script: |
          flutter clean
          rm -rf pubspec.lock
          rm -rf .dart_tool
          rm -rf ~/.pub-cache

      - name: Get dependencies (fresh resolve)
        script: |
          flutter pub get

      - name: Build APK (safe mode)
        script: |
          flutter build apk --release --no-tree-shake-icons --no-shrink

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - alirezazekri60@gmail.com
