name: Build APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v | tee flutter-doctor.log

      - name: Install dependencies
        run: flutter pub get | tee flutter-pub-get.log

      - name: Build debug APK
        id: build_debug
        continue-on-error: true
        run: flutter build apk --debug -v | tee build-debug.log

      - name: Build release APK
        id: build_release
        continue-on-error: true
        run: flutter build apk --release -v | tee build-release.log

      - name: Show generated APK files
        if: always()
        run: find build -type f -name "*.apk" -print | tee apk-files.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            flutter-doctor.log
            flutter-pub-get.log
            build-debug.log
            build-release.log
            apk-files.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload debug APK
        if: ${{ hashFiles('build/app/outputs/flutter-apk/app-debug.apk') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        if: ${{ hashFiles('build/app/outputs/flutter-apk/app-release.apk') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Fail if no APK produced
        if: ${{ hashFiles('build/app/outputs/flutter-apk/app-debug.apk') == '' && hashFiles('build/app/outputs/flutter-apk/app-release.apk') == '' }}
        run: |
          echo "No APK was produced. Check build-logs artifact for root cause."
          exit 1
